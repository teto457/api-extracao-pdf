# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python application

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.10
      uses: actions/setup-python@v3
      with:
        python-version: "3.10"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    - name: Test with pytest
      run: |
        pytest tests --maxfail=1 --disable-warnings -v

    - name: Notify Discord on PR failure
      if: ${{ failure() && github.event_name == 'pull_request' }}
      uses: tsickert/discord-webhook@v7.0.0
      with:
        webhook-url: ${{ secrets.DISCORD_WEBHOOK_URL }}
        content: |
          :x: PR check failed.
          Repository: ${{ github.repository }}
          PR: #${{ github.event.pull_request.number }}
          Actor: ${{ github.actor }}
          Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

    - name: Build Docker image (mock)
      run: |
        docker build -t api-extracao-pdf .
        docker save api-extracao-pdf -o api-extracao-pdf.tar
  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
    - name: Upload Docker image artifact (mock)
      uses: actions/upload-artifact@v4
      with:
        name: api-extracao-pdf-image
        path: api-extracao-pdf.tar
